name: Test Cloud Radar Bot v2

on:
  workflow_dispatch: # ปุ่มกดรันเองแบบ Manual บนหน้าเว็บ GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. ดึงโค้ดล่าสุดจากคลังของคุณออกมาใช้งาน
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. ตั้งค่าเวอร์ชัน Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. ติดตั้งโมดูลทั้งหมดจากไฟล์ requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. สั่งรันสคริปต์เวอร์ชันล่าสุดที่มีการสร้างกราฟ 5 ชั่วโมง
      - name: Run Cloud Radar Bot
        run: python cloud_alert_v2.py
