name: Hourly Cloud Alert Bot

on:
  # 1. ⚡ เปิดระบบให้สามารถกดปุ่ม "Run workflow" สั่งรันด้วยมือได้ตลอดเวลา
  workflow_dispatch: 

  # 2. ⏱️ สั่งรันอัตโนมัติทุก 1 ชั่วโมง (นาทีที่ 0 ของทุกชั่วโมง)
  schedule:
    - cron: '0 * * * *'

  # 3. 🚀 สั่งรันทันทีหากคุณมีการกดแก้ไขและอัปเดตไฟล์โค้ดบน GitHub (สะดวกต่อการทดสอบมาก)
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Libraries
        run: |
          pip install openmeteo-requests requests-cache tenacity pandas geopy requests

      - name: Run Cloud Alert Script
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: python cloud_alert_v2.py

      - name: Commit and Push State File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # คุมการอัปเดตไฟล์บันทึกสถานะตามโครงสร้างที่คุณใช้จริงในเครื่อง
          if [ -f cloud_radar_state.json ]; then
            git add cloud_radar_state.json
            git commit -m "🤖 [Automated] Update cloud radar state memory [Skip CI]" || echo "No changes to commit"
            git push || echo "No changes to push"
          fi
