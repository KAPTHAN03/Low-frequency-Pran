name: Cloud Radar Bot Main Workflow

on:
  schedule:
    - cron: '0 0-12 * * *' # รันทุกต้นชั่วโมง (เวลา UTC 00:00-12:00 ตรงกับเวลาไทย 07:00-19:00 น.)
  workflow_dispatch: # เปิดให้กดรันเองแบบ Manual ได้ด้วย

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ขั้นตอนนี้จะดึงไฟล์ JSON สถานะล่าสุดกลับมา เพื่อไม่ให้บอทส่งแจ้งเตือนเบิ้ลในชั่วโมงเดิม
      - name: Create state file if not exists
        run: |
          if [ ! -f cloud_radar_state.json ]; then echo '{"last_alert_date": "", "last_alert_hour": -1}' > cloud_radar_state.json; fi

      - name: Run Cloud Radar Bot
        run: python cloud_alert_v2.py

      # เซฟสถานะการแจ้งเตือนกลับเข้าสู่ระบบ GitHub หลังจากรันเสร็จ
      - name: Commit and Push state changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add cloud_radar_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "💾 Update bot state memory" && git push)
